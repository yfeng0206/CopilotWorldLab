# CopilotWorldLab step-1 MuJoCo pilot configuration.
# Step 1 is simulation + rendering only; the world_model / planner blocks are
# placeholders for the V-JEPA 2-AC wiring in a later session.

env:
  model_path: assets/mujoco/scene.xml
  render_width: 256      # V-JEPA 2 expects 256x256 RGB clips
  render_height: 256
  default_camera: scene_cam   # third-person; DROID-like view for the first zero-shot test.
                              # wrist_cam (downward) is likely out-of-distribution -> ablation only.
  n_substeps: 5          # physics steps per apply_action
  gl_backend: null       # null => MuJoCo default (wgl on Windows); e.g. "egl" on Linux
  seed: 0

action:
  # 7-D end-effector delta bounds [dx, dy, dz, droll, dpitch, dyaw, dgripper].
  # Coarse motion only; conservative caps for a single planner step.
  translation_limit: 0.05      # metres per step
  rotation_limit: 0.20         # radians per step
  gripper_limit: 1.0

world_model:
  # Populated in a later session; download targets live under checkpoints/.
  backend: vjepa2_ac           # vjepa2_ac (Option 1, MPC) | vla_jepa (Option 2, feed-forward)
  checkpoint_dir: checkpoints
  ac_checkpoint: checkpoints/vjepa2-ac-vitg.pt
  device: cuda

planner:
  # Cross-Entropy-Method MPC defaults from the V-JEPA 2-AC paper.
  samples: 800
  iterations: 10
  horizon: 1
  top_k: 10
